<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Kissapeli 🐾</title>

<!-- Käynnistää ilman selaimen palkkeja kun lisätään aloitusnäyttöön -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kissapeli">

<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    touch-action: none; overscroll-behavior: none;
  }
  body {
    background: #2a9d8f;
    transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  #start-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #start-screen h1 {
    color: white; font-size: clamp(36px, 9vw, 72px);
    font-weight: 800; letter-spacing: -0.02em;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  #start-screen p {
    color: rgba(255,255,255,0.85);
    font-size: clamp(16px, 4vw, 22px);
    text-align: center; padding: 0 24px;
  }
  #start-btn {
    padding: 22px 56px; font-size: clamp(24px, 6vw, 32px);
    border: none; border-radius: 999px;
    background: linear-gradient(135deg, #ffd166, #ef476f);
    color: white; cursor: pointer; font-weight: 800;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35), inset 0 -4px 0 rgba(0,0,0,0.15);
    transition: transform 0.15s ease;
  }
  #start-btn:active { transform: scale(0.94); }

  #game { position: fixed; inset: 0; }

  .ball {
    position: absolute; left: 0; top: 0;
    border-radius: 50%; cursor: pointer;
    will-change: transform;
    box-shadow:
      inset -10px -10px 25px rgba(0,0,0,0.28),
      inset 8px 8px 20px rgba(255,255,255,0.25),
      0 8px 24px rgba(0,0,0,0.3);
  }

  #score {
    position: fixed;
    top: max(18px, env(safe-area-inset-top));
    left: max(22px, env(safe-area-inset-left));
    color: white; font-size: clamp(28px, 7vw, 42px);
    font-weight: 800; letter-spacing: -0.02em;
    text-shadow: 0 3px 12px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 50;
    font-variant-numeric: tabular-nums;
  }

  #exit {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: max(14px, env(safe-area-inset-right));
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    color: white; border: none;
    font-size: 20px; cursor: pointer;
    z-index: 50; display: flex;
    align-items: center; justify-content: center;
    line-height: 1; font-weight: 600;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #exit:active { transform: scale(0.9); }

  @keyframes pop {
    0%   { transform: translate(var(--bx), var(--by)) scale(1);   opacity: 1; }
    100% { transform: translate(var(--bx), var(--by)) scale(2.4); opacity: 0; }
  }
  .pop { animation: pop 0.35s ease-out forwards; }

  .sparkle {
    position: fixed; pointer-events: none;
    font-size: clamp(36px, 8vw, 56px);
    animation: sparkleAnim 0.8s ease-out forwards;
    z-index: 60;
    transform: translate(-50%, -50%);
  }
  @keyframes sparkleAnim {
    0%   { transform: translate(-50%, -50%) scale(0.4) rotate(0deg);    opacity: 1; }
    100% { transform: translate(-50%, -150%) scale(2) rotate(45deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="start-screen">
  <h1>🐾 Kissapeli 🐾</h1>
  <p>Anna kissan tassutella palloja!</p>
  <button id="start-btn">Aloita</button>
</div>

<div id="game"></div>
<div id="score">0</div>
<button id="exit" aria-label="Sulje">✕</button>

<script>
  const game = document.getElementById('game');
  const scoreEl = document.getElementById('score');
  const startScreen = document.getElementById('start-screen');
  const startBtn = document.getElementById('start-btn');
  const exitBtn = document.getElementById('exit');

  let score = 0;
  let currentBall = null;
  let audioCtx = null;
  let running = false;

  const colors = [
    ['#ff6b6b', '#c92a2a'], ['#ffd166', '#f08c00'], ['#06d6a0', '#0b7a51'],
    ['#118ab2', '#073b4c'], ['#ef476f', '#9d174d'], ['#9b5de5', '#5b21b6'],
    ['#f15bb5', '#a21567'], ['#00bbf9', '#0369a1'], ['#fb5607', '#9a3412'],
    ['#3a86ff', '#1e40af'], ['#ffbe0b', '#a16207'], ['#8338ec', '#4c1d95']
  ];

  const bgColors = [
    '#264653', '#2a9d8f', '#e76f51', '#1d3557', '#457b9d', '#6a4c93',
    '#1982c4', '#386641', '#bc4749', '#003049', '#5a189a', '#0f4c5c'
  ];

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playRandomSound() {
    if (!audioCtx) return;
    const sounds = [boop, chirp, popSound, meow, twinkle];
    sounds[Math.floor(Math.random() * sounds.length)]();
  }

  function boop() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(900, t);
    o.frequency.exponentialRampToValueAtTime(220, t + 0.18);
    g.gain.setValueAtTime(0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.22);
  }

  function chirp() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(450, t);
    o.frequency.exponentialRampToValueAtTime(1400, t + 0.12);
    g.gain.setValueAtTime(0.28, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.16);
  }

  function popSound() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(700, t);
    o.frequency.exponentialRampToValueAtTime(90, t + 0.09);
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.11);
  }

  function meow() {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const f = audioCtx.createBiquadFilter();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(450, t);
    o.frequency.linearRampToValueAtTime(820, t + 0.12);
    o.frequency.linearRampToValueAtTime(380, t + 0.35);
    f.type = 'lowpass';
    f.frequency.setValueAtTime(1800, t);
    f.Q.value = 6;
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.connect(f); f.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.4);
  }

  function twinkle() {
    const t = audioCtx.currentTime;
    [0, 0.08, 0.16].forEach((delay, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      const freqs = [800, 1200, 1600];
      o.frequency.setValueAtTime(freqs[i], t + delay);
      g.gain.setValueAtTime(0.001, t + delay);
      g.gain.linearRampToValueAtTime(0.18, t + delay + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.18);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + delay); o.stop(t + delay + 0.2);
    });
  }

  function spawnBall() {
    if (!running || currentBall) return;

    const minSize = Math.min(window.innerWidth, window.innerHeight) * 0.18;
    const maxSize = Math.min(window.innerWidth, window.innerHeight) * 0.32;
    const size = minSize + Math.random() * (maxSize - minSize);

    const ball = document.createElement('div');
    ball.className = 'ball';
    ball.style.width = size + 'px';
    ball.style.height = size + 'px';

    const [c1, c2] = colors[Math.floor(Math.random() * colors.length)];
    ball.style.background = `radial-gradient(circle at 32% 28%, ${c1}, ${c2} 75%)`;

    const W = window.innerWidth;
    const H = window.innerHeight;

    let x = Math.random() * (W - size);
    let y = Math.random() * (H - size);

    const speed = 1 + Math.random() * 7;
    const angle = Math.random() * Math.PI * 2;
    let vx = Math.cos(angle) * speed;
    let vy = Math.sin(angle) * speed;

    ball.style.transform = `translate(${x}px, ${y}px)`;
    game.appendChild(ball);
    currentBall = { el: ball, x, y, vx, vy, size, alive: true };

    const hit = (e) => {
      if (!currentBall || !currentBall.alive) return;
      e.preventDefault();
      currentBall.alive = false;

      score++;
      scoreEl.textContent = score;

      const cx = currentBall.x + currentBall.size / 2;
      const cy = currentBall.y + currentBall.size / 2;
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      const emojis = ['✨', '⭐', '💫', '🌟', '🎉', '🐾'];
      sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      sparkle.style.left = cx + 'px';
      sparkle.style.top = cy + 'px';
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 800);

      let next;
      do { next = bgColors[Math.floor(Math.random() * bgColors.length)]; }
      while (next === document.body.style.backgroundColor);
      document.body.style.background = next;

      playRandomSound();

      ball.style.setProperty('--bx', currentBall.x + 'px');
      ball.style.setProperty('--by', currentBall.y + 'px');
      ball.classList.add('pop');
      ball.style.pointerEvents = 'none';

      setTimeout(() => {
        ball.remove();
        currentBall = null;
        setTimeout(spawnBall, 250 + Math.random() * 500);
      }, 350);
    };

    ball.addEventListener('pointerdown', hit);
  }

  function tick() {
    if (running && currentBall && currentBall.alive) {
      const b = currentBall;
      b.x += b.vx; b.y += b.vy;
      const W = window.innerWidth, H = window.innerHeight;
      if (b.x < 0)            { b.x = 0;            b.vx = Math.abs(b.vx); }
      if (b.x > W - b.size)   { b.x = W - b.size;   b.vx = -Math.abs(b.vx); }
      if (b.y < 0)            { b.y = 0;            b.vy = Math.abs(b.vy); }
      if (b.y > H - b.size)   { b.y = H - b.size;   b.vy = -Math.abs(b.vy); }
      b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
    }
    requestAnimationFrame(tick);
  }

  async function startGame() {
    initAudio();

    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch (err) { /* fullscreen not allowed; continue */ }

    startScreen.style.display = 'none';
    running = true;
    score = 0;
    scoreEl.textContent = '0';
    spawnBall();
  }

  function exitGame() {
    running = false;
    if (currentBall) { currentBall.el.remove(); currentBall = null; }
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
    startScreen.style.display = 'flex';
  }

  startBtn.addEventListener('click', startGame);
  exitBtn.addEventListener('click', exitGame);

  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('contextmenu', e => e.preventDefault());

  tick();
</script>
</body>

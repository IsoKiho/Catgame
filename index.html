<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Kissapeli 🐾</title>

<!-- Käynnistää ilman selaimen palkkeja kun lisätään aloitusnäyttöön -->

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kissapeli">

<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
  }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    touch-action: none; overscroll-behavior: none;
  }
  body {
    background: #2a9d8f;
    transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  #start-screen, #end-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #end-screen { display: none; }
  #start-screen h1, #end-screen h1 {
    color: white; font-size: clamp(36px, 9vw, 72px);
    font-weight: 800; letter-spacing: -0.02em;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    text-align: center;
  }
  #start-screen p, #end-screen p {
    color: rgba(255,255,255,0.85);
    font-size: clamp(16px, 4vw, 22px);
    text-align: center; padding: 0 24px;
  }
  #end-score {
    color: #ffd166; font-size: clamp(48px, 14vw, 96px);
    font-weight: 900; letter-spacing: -0.03em;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
    font-variant-numeric: tabular-nums;
  }
  #start-btn, #again-btn {
    padding: 22px 56px; font-size: clamp(24px, 6vw, 32px);
    border: none; border-radius: 999px;
    background: linear-gradient(135deg, #ffd166, #ef476f);
    color: white; cursor: pointer; font-weight: 800;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35), inset 0 -4px 0 rgba(0,0,0,0.15);
    transition: transform 0.15s ease;
  }
  #start-btn:active, #again-btn:active { transform: scale(0.94); }

  #game { position: fixed; inset: 0; }

  .ball {
    position: absolute; left: 0; top: 0;
    border-radius: 50%; cursor: pointer;
    will-change: transform;
    box-shadow:
      inset -10px -10px 25px rgba(0,0,0,0.28),
      inset 8px 8px 20px rgba(255,255,255,0.25),
      0 8px 24px rgba(0,0,0,0.3);
  }

  #score {
    position: fixed;
    top: max(18px, env(safe-area-inset-top));
    left: max(22px, env(safe-area-inset-left));
    color: white; font-size: clamp(28px, 7vw, 42px);
    font-weight: 800; letter-spacing: -0.02em;
    text-shadow: 0 3px 12px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 50;
    font-variant-numeric: tabular-nums;
  }

  #exit {
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    right: max(14px, env(safe-area-inset-right));
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    color: white; border: none;
    font-size: 20px; cursor: pointer;
    z-index: 50; display: flex;
    align-items: center; justify-content: center;
    line-height: 1; font-weight: 600;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #exit:active { transform: scale(0.9); }

  @keyframes pop {
    0%   { transform: translate(var(--bx), var(--by)) scale(1);   opacity: 1; }
    100% { transform: translate(var(--bx), var(--by)) scale(2.4); opacity: 0; }
  }
  .pop { animation: pop 0.35s ease-out forwards; }

  .sparkle {
    position: fixed; pointer-events: none;
    font-size: clamp(36px, 8vw, 56px);
    animation: sparkleAnim 0.8s ease-out forwards;
    z-index: 60;
    transform: translate(-50%, -50%);
  }
  @keyframes sparkleAnim {
    0%   { transform: translate(-50%, -50%) scale(0.4) rotate(0deg);    opacity: 1; }
    100% { transform: translate(-50%, -150%) scale(2) rotate(45deg); opacity: 0; }
  }
</style>

</head>
<body>

<div id="start-screen">
  <h1>🐾 Kissapeli 🐾</h1>
  <p>Anna kissan tassutella palloja!<br>Sessio kestää noin 8 minuuttia.</p>
  <button id="start-btn">Aloita</button>
</div>

<div id="end-screen">
  <h1>Hyvä saalistus! 🐾</h1>
  <p>Saalista yhteensä</p>
  <div id="end-score">0</div>
  <button id="again-btn">Pelaa uudestaan</button>
</div>

<div id="game"></div>
<div id="score">0</div>
<button id="exit" aria-label="Sulje">✕</button>

<script>
  // ============================================================
  //  Kissapeli — saalistuspeli kissalle
  //  Liikemalli perustuu kissan luontaiseen saalistus-sekvenssiin:
  //    stalk (pysähtyy ja vaanii) → creep (hidas hiipiminen)
  //    → dash (nopea purske) → wander (rauhallinen liike)
  //  Pallon koot vaihtelevat (myös pieni hiiren kokoinen).
  //  Äänet: rapinaa (suodatettu kohina) + saaliin vingahdus.
  // ============================================================

  const game        = document.getElementById('game');
  const scoreEl     = document.getElementById('score');
  const startScreen = document.getElementById('start-screen');
  const endScreen   = document.getElementById('end-screen');
  const endScoreEl  = document.getElementById('end-score');
  const startBtn    = document.getElementById('start-btn');
  const againBtn    = document.getElementById('again-btn');
  const exitBtn     = document.getElementById('exit');

  const SESSION_MS = 8 * 60 * 1000;  // 8 min sessio (suositus 5-10 min)

  let score = 0;
  let currentBall = null;
  let audioCtx = null;
  let noiseBuffer = null;
  let running = false;
  let sessionTimer = null;

  const colors = [
    ['#ff6b6b', '#c92a2a'], ['#ffd166', '#f08c00'], ['#06d6a0', '#0b7a51'],
    ['#118ab2', '#073b4c'], ['#ef476f', '#9d174d'], ['#9b5de5', '#5b21b6'],
    ['#f15bb5', '#a21567'], ['#00bbf9', '#0369a1'], ['#fb5607', '#9a3412'],
    ['#3a86ff', '#1e40af'], ['#ffbe0b', '#a16207'], ['#8338ec', '#4c1d95']
  ];

  const bgColors = [
    '#264653', '#2a9d8f', '#e76f51', '#1d3557', '#457b9d', '#6a4c93',
    '#1982c4', '#386641', '#bc4749', '#003049', '#5a189a', '#0f4c5c'
  ];

  // ----- Audio -----

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Esiluodaan kohinapuskuri rapinoita varten
      const len = audioCtx.sampleRate * 1.0;
      noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // Rapina — suodatettu kohina granulaarisella kuoren muotoilulla.
  // Kuulostaa kuivilta lehdiltä tai pieneltä eläimeltä joka rapistelee.
  function rustle(volume = 0.18, durMs = 220) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const dur = durMs / 1000;

    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer;
    src.loop = true;

    // Bandpass korkealla (kuiva, terävä rapina ~3-7 kHz)
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3000 + Math.random() * 3500;
    filter.Q.value = 1.2;

    // Granulaarinen amplitudikäyrä — pieniä piikkejä peräkkäin
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    const grains = 5 + Math.floor(Math.random() * 4);
    for (let i = 0; i < grains; i++) {
      const tt = t + (i / grains) * dur;
      const peak = volume * (0.4 + Math.random() * 0.6);
      gain.gain.linearRampToValueAtTime(peak, tt + 0.005);
      gain.gain.linearRampToValueAtTime(volume * 0.1, tt + dur / grains * 0.7);
    }
    gain.gain.linearRampToValueAtTime(0, t + dur);

    src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
    src.start(t); src.stop(t + dur + 0.05);
  }

  // Saaliin vingahdus — pieni "squeak" osumaan
  function squeak() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(1400, t);
    o.frequency.exponentialRampToValueAtTime(2400, t + 0.04);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.14);
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.2);
  }

  // Sirkutus — kuin lintu / hyönteinen
  function chirp() {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [0, 0.07].forEach(d => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(2200, t + d);
      o.frequency.exponentialRampToValueAtTime(3200, t + d + 0.05);
      g.gain.setValueAtTime(0.001, t + d);
      g.gain.linearRampToValueAtTime(0.14, t + d + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + d + 0.07);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t + d); o.stop(t + d + 0.08);
    });
  }

  // Osumaääni — voimakas rapina + saaliin vingahdus
  function captureSound() {
    rustle(0.28, 180);
    setTimeout(squeak, 40);
  }

  // Liikkeen rapina — hiljaisempi, satunnainen
  function moveRustle() {
    if (Math.random() < 0.7) {
      rustle(0.06 + Math.random() * 0.05, 100 + Math.random() * 80);
    } else {
      if (Math.random() < 0.4) chirp();
    }
  }

  // ----- Pelilogiikka -----

  // Tilakone saalistusliikkeelle. Kukin tila kestää oman aikansa.
  //   stalk = paikallaan, vaanii — kissalle aikaa lähestyä
  //   creep = hidas, melkein huomaamaton liike
  //   dash  = nopea purske kuin pakeneva hiiri
  //   wander = rauhallinen perustila
  function pickNextState(prev) {
    const r = Math.random();
    if (prev === 'dash')  return r < 0.55 ? 'stalk' : (r < 0.8 ? 'creep' : 'wander');
    if (prev === 'stalk') return r < 0.45 ? 'dash'  : (r < 0.75 ? 'creep' : 'wander');
    if (prev === 'creep') return r < 0.5  ? 'dash'  : (r < 0.8 ? 'stalk' : 'wander');
    return r < 0.3 ? 'stalk' : (r < 0.55 ? 'creep' : (r < 0.85 ? 'dash' : 'wander'));
  }

  function configureState(b, state) {
    b.state = state;
    b.stateStart = performance.now();
    const angle = Math.random() * Math.PI * 2;

    if (state === 'stalk') {
      b.targetSpeed = 0;
      b.stateDur = 800 + Math.random() * 1700;     // 0.8 - 2.5 s pysähdys
      b.jitter = true;                              // pieni huojunta paikallaan
    } else if (state === 'creep') {
      b.targetSpeed = 0.3 + Math.random() * 0.7;   // hyvin hidas
      b.stateDur = 1000 + Math.random() * 1500;
      b.dirX = Math.cos(angle); b.dirY = Math.sin(angle);
      b.jitter = false;
    } else if (state === 'dash') {
      b.targetSpeed = 5 + Math.random() * 5;       // nopea purske
      b.stateDur = 400 + Math.random() * 900;
      b.dirX = Math.cos(angle); b.dirY = Math.sin(angle);
      b.jitter = false;
      moveRustle();                                 // dash alkaa rapinalla
    } else { // wander
      b.targetSpeed = 1.5 + Math.random() * 2;
      b.stateDur = 1200 + Math.random() * 1800;
      b.dirX = Math.cos(angle); b.dirY = Math.sin(angle);
      b.jitter = false;
    }
  }

  function spawnBall() {
    if (!running || currentBall) return;

    const minDim = Math.min(window.innerWidth, window.innerHeight);
    // Koon vaihtelu: 30% pieni (hiiren kokoinen), 50% keski, 20% iso
    const r = Math.random();
    let size;
    if (r < 0.3)      size = minDim * (0.08 + Math.random() * 0.05);  // pieni
    else if (r < 0.8) size = minDim * (0.15 + Math.random() * 0.08);  // keski
    else              size = minDim * (0.24 + Math.random() * 0.07);  // iso

    const ball = document.createElement('div');
    ball.className = 'ball';
    ball.style.width = size + 'px';
    ball.style.height = size + 'px';

    const [c1, c2] = colors[Math.floor(Math.random() * colors.length)];
    ball.style.background = `radial-gradient(circle at 32% 28%, ${c1}, ${c2} 75%)`;

    const W = window.innerWidth, H = window.innerHeight;
    const x = Math.random() * (W - size);
    const y = Math.random() * (H - size);

    ball.style.transform = `translate(${x}px, ${y}px)`;
    game.appendChild(ball);

    currentBall = {
      el: ball, x, y, size,
      vx: 0, vy: 0,
      dirX: 1, dirY: 0,
      targetSpeed: 0,
      state: null, stateStart: 0, stateDur: 0, jitter: false,
      lastRustle: 0,
      alive: true
    };
    configureState(currentBall, pickNextState(null));

    // Spawnauksessa hiljainen rapina — kuin saalis ilmestyisi rapisten
    rustle(0.08, 140);

    const hit = (e) => {
      if (!currentBall || !currentBall.alive) return;
      e.preventDefault();
      currentBall.alive = false;

      score++;
      scoreEl.textContent = score;

      const cx = currentBall.x + currentBall.size / 2;
      const cy = currentBall.y + currentBall.size / 2;
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      const emojis = ['✨', '⭐', '💫', '🌟', '🎉', '🐾'];
      sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      sparkle.style.left = cx + 'px';
      sparkle.style.top = cy + 'px';
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 800);

      let next;
      do { next = bgColors[Math.floor(Math.random() * bgColors.length)]; }
      while (next === document.body.style.backgroundColor);
      document.body.style.background = next;

      captureSound();

      ball.style.setProperty('--bx', currentBall.x + 'px');
      ball.style.setProperty('--by', currentBall.y + 'px');
      ball.classList.add('pop');
      ball.style.pointerEvents = 'none';

      setTimeout(() => {
        ball.remove();
        currentBall = null;
        // Saaliin jälkeen pieni tauko (kissa "syö") — 0.5-1.2 s
        setTimeout(spawnBall, 500 + Math.random() * 700);
      }, 350);
    };

    ball.addEventListener('pointerdown', hit);
  }

  function tick() {
    if (running && currentBall && currentBall.alive) {
      const b = currentBall;
      const now = performance.now();

      // Vaihda tilaa kun kesto täyttyy
      if (now - b.stateStart > b.stateDur) {
        configureState(b, pickNextState(b.state));
      }

      // Liikkeen rapina satunnaisesti dash/creep-tiloissa
      if (b.state === 'dash' && now - b.lastRustle > 250 + Math.random() * 400) {
        b.lastRustle = now;
        if (Math.random() < 0.5) moveRustle();
      } else if (b.state === 'creep' && now - b.lastRustle > 800 + Math.random() * 1200) {
        b.lastRustle = now;
        if (Math.random() < 0.3) moveRustle();
      }

      // Pehmeä kiihdytys kohti tavoitenopeutta
      const ax = b.dirX * b.targetSpeed - b.vx;
      const ay = b.dirY * b.targetSpeed - b.vy;
      b.vx += ax * 0.12;
      b.vy += ay * 0.12;

      // Stalk-tilassa pieni huojunta paikallaan
      if (b.jitter) {
        b.vx = (Math.random() - 0.5) * 0.6;
        b.vy = (Math.random() - 0.5) * 0.6;
      }

      b.x += b.vx;
      b.y += b.vy;

      const W = window.innerWidth, H = window.innerHeight;
      if (b.x < 0)            { b.x = 0;          b.vx = Math.abs(b.vx);  b.dirX = Math.abs(b.dirX); }
      if (b.x > W - b.size)   { b.x = W - b.size; b.vx = -Math.abs(b.vx); b.dirX = -Math.abs(b.dirX); }
      if (b.y < 0)            { b.y = 0;          b.vy = Math.abs(b.vy);  b.dirY = Math.abs(b.dirY); }
      if (b.y > H - b.size)   { b.y = H - b.size; b.vy = -Math.abs(b.vy); b.dirY = -Math.abs(b.dirY); }

      b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
    }
    requestAnimationFrame(tick);
  }

  // ----- Sessionhallinta -----

  async function startGame() {
    initAudio();

    const el = document.documentElement;
    try {
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch (err) { /* fullscreen ei sallittu, jatketaan silti */ }

    startScreen.style.display = 'none';
    endScreen.style.display = 'none';
    running = true;
    score = 0;
    scoreEl.textContent = '0';

    if (sessionTimer) clearTimeout(sessionTimer);
    sessionTimer = setTimeout(endSession, SESSION_MS);

    spawnBall();
  }

  function endSession() {
    running = false;
    if (currentBall) { currentBall.el.remove(); currentBall = null; }
    endScoreEl.textContent = score;
    endScreen.style.display = 'flex';
  }

  function exitGame() {
    running = false;
    if (sessionTimer) { clearTimeout(sessionTimer); sessionTimer = null; }
    if (currentBall) { currentBall.el.remove(); currentBall = null; }
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
    endScreen.style.display = 'none';
    startScreen.style.display = 'flex';
  }

  startBtn.addEventListener('click', startGame);
  againBtn.addEventListener('click', startGame);
  exitBtn.addEventListener('click', exitGame);

  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('contextmenu', e => e.preventDefault());

  tick();
</script>

</body>
</html>
